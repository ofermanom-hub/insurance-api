name: CI Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest flake8

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint
        run: flake8 src/ --max-line-length=100
